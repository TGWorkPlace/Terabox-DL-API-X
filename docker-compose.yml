services:
  terabox-api:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    shm_size: "512mb"          # Chromium needs shared memory
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
